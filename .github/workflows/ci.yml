name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cowork_logistics
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm install

      - name: Build shared package
        run: npm run build:shared

      - name: Build gateway
        run: npm run build:gateway

      - name: Build TMS
        run: npm run build:tms

      - name: Install WMS dependencies
        run: pip install -r services/wms/backend/requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cowork_logistics
        run: npm run db:migrate

      - name: Seed database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cowork_logistics
        run: npm run db:seed
